[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "projectlens-shared"
version = "0.1.0"
description = "Shared models, schemas, DTOs, constants, and types for the ProjectLens AI platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]
