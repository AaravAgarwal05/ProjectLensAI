[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "projectlens-core"
version = "0.1.0"
description = "Core foundational package for ProjectLens AI"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5,<3",
    "pydantic-settings>=2.1,<3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
