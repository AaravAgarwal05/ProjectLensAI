name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          pip install hatch
          cd apps/backend && pip install -e ".[dev]" && cd ../..
          cd packages/core && pip install -e ".[dev]" && cd ../..
          cd packages/shared && pip install -e ".[dev]" && cd ../..
      - name: Ruff
        run: ruff check apps/backend packages/core packages/shared
      - name: mypy
        run: mypy apps/backend/src packages/core/src packages/shared/src

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: projectlens
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          cd apps/backend && pip install -e ".[dev]" && cd ../..
          cd packages/core && pip install -e ".[dev]" && cd ../..
          cd packages/shared && pip install -e ".[dev]" && cd ../..
      - name: Test
        run: cd apps/backend && pytest --cov=src --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/projectlens
          SECRET_KEY: test-secret-key

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install
        run: cd apps/frontend && npm ci
      - name: Lint
        run: cd apps/frontend && npm run lint
      - name: Type check
        run: cd apps/frontend && npm run typecheck

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install
        run: cd apps/frontend && npm ci
      - name: Build
        run: cd apps/frontend && npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker compose build
